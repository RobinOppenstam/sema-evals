name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install the official Sema source and registry dependencies
        run: python -m pip install "semahash==0.3.0"
      - name: Select the Sema interpreter
        run: echo "SEMA_PYTHON=$(command -v python)" >> "$GITHUB_ENV"
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
