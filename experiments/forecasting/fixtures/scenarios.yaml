# Forecasting council fixtures (RESEARCH_PLAN Phase 5 scaffold).
#
# Synthetic Polymarket-style questions (invented events). Each topic appears
# twice: a `-drift` scenario, where exactly one forecaster's registry holds a
# mutated definition for exactly one coordination handle, and a `-clean`
# no-drift control with identical content and `drift: null`.
#
# Ground truth (outcomes, drift specs, audit verdicts) lives ONLY in the
# structured fields below. Agent-facing text (`questionText`,
# `resolutionCriteria`, definition glosses) never carries annotations about
# the mutation or the expected endpoint.
#
# Drift families covered:
#   - probability-format (0–1 vs 0–100) — baseline averages 0.62-scale with 62
#   - resolution-definition (announced vs effective; threshold comparator)
schemaVersion: "0.1.0"
scenarios:
  # ---------------------------------------------------------------------------
  # Probability-format drift: baseline averages 0.55+0.60+0.65+0.58+62 = 12.876
  # ---------------------------------------------------------------------------
  - id: "synthetic-prob-format-drift"
    title: "Synthetic Q2 product launch — probability format drift"
    description: >-
      Forecaster-4's registry has drifted ProbabilityFormat from unit (0–1) to
      percent (0–100). Its reported 62 is correct under its format and
      catastrophic when averaged raw under baseline.
    question:
      questionText: >-
        Will Acme Corp announce a generally available launch of Product X by
        30 June 2024?
      resolutionCriteria: >-
        Resolves YES if Acme Corp publicly announces general availability of
        Product X on or before 30 June 2024 23:59 UTC. Resolves NO otherwise.
        Announcement means an official company press release or blog post;
        third-party rumors do not count.
      resolutionTimestamp: "2024-07-01T00:00:00.000Z"
      resolvedOutcome: "YES"
      marketPrior: 0.48
      evidencePack: null
    leakageAudit:
      model: "synthetic-auditor-v1"
      zeroEvidenceAnswer: "YES"
      confidence: 0.72
      verdict: "keep"
    patterns:
      - handle: "ResolutionDefinition"
        definition:
          gloss: "What counts as YES for the Product X launch question."
          anchor: "announced"
          deadline: "2024-06-30T23:59:59.000Z"
          source: "official_company_channel"
      - handle: "EvidenceCutoff"
        definition:
          gloss: "Latest time evidence may be used when forecasting."
          cutoff: "2024-06-30T23:59:59.000Z"
          timezone: "UTC"
      - handle: "ProbabilityFormat"
        definition:
          gloss: "How probability values are encoded."
          scale: "unit"
          minimum: 0
          maximum: 1
      - handle: "AggregationRule"
        definition:
          gloss: "How council forecasts are combined."
          method: "probability_mean"
          requiresFormatNormalization: true
    coordinationHandles:
      - "ResolutionDefinition"
      - "EvidenceCutoff"
      - "ProbabilityFormat"
      - "AggregationRule"
    agents:
      - id: "forecaster-0"
        round1Probability: 0.52
        round2Probability: 0.55
      - id: "forecaster-1"
        round1Probability: 0.58
        round2Probability: 0.6
      - id: "forecaster-2"
        round1Probability: 0.62
        round2Probability: 0.65
      - id: "forecaster-3"
        round1Probability: 0.55
        round2Probability: 0.58
      - id: "forecaster-4"
        # Reported in percent under drifted format: 62 means 0.62.
        round1Probability: 60
        round2Probability: 62
    drift:
      agentId: "forecaster-4"
      handle: "ProbabilityFormat"
      fieldPath: "scale"
      before: "unit"
      after: "percent"
      mutatedDefinition:
        gloss: "How probability values are encoded."
        scale: "percent"
        minimum: 0
        maximum: 100

