# x402 payment-contract drift fixtures (RESEARCH_PLAN parallel track).
#
# Each topic appears twice: a `-drift` scenario, where the payer's registry
# holds a mutated definition for exactly one acceptance handle (controlled
# cross-party registry drift), and a `-clean` no-drift control with identical
# content and `drift: null`. Running both under all three conditions on the same
# scenario/seed blocks lets the demo measure silent payment and detection on
# the drift scenarios and the false-refusal guard on the clean controls.
#
# Ground truth lives ONLY in the `drift` blocks below. Payer-facing text
# (`resourceDescription`) never carries annotations about the mutation.
schemaVersion: "0.1.0"
scenarios:
  - id: "refund-window-drift"
    title: "API access with drifted refund-window anchor"
    description: >-
      The payer's registry has drifted RefundWindow from anchoring on delivery
      to anchoring on payment.
    resourceDescription: "Premium market data feed with refund and settlement terms."
    resource: "https://api.example.com/premium-data"
    scheme: "exact"
    network: "base-sepolia"
    maxAmountRequired: "10000"
    asset: "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
    payTo: "0x209693Bc6afc0C5328bA36FaF03C514EF312287C"
    maxTimeoutSeconds: 60
    patterns:
      - handle: "RefundWindow"
        definition:
          gloss: "Period during which the payer may request a refund."
          durationDays: 7
          anchor: "delivery"
      - handle: "SettlementFinality"
        definition:
          gloss: "When a settlement is considered final."
          requiresConfirmations: 12
          status: "irreversible"
      - handle: "DisputeWindow"
        definition:
          gloss: "Time a counterparty may open a dispute."
          comparator: ">="
          threshold: 72
          unit: "hours"
    acceptanceHandles: ["RefundWindow", "SettlementFinality", "DisputeWindow"]
    drift:
      handle: "RefundWindow"
      fieldPath: "anchor"
      before: "delivery"
      after: "payment"
      mutatedDefinition:
        gloss: "Period during which the payer may request a refund."
        durationDays: 7
        anchor: "payment"
  - id: "refund-window-clean"
    title: "API access with aligned refund-window registries"
    description: "The no-drift control for the refund-window topic."
    resourceDescription: "Premium market data feed with refund and settlement terms."
    resource: "https://api.example.com/premium-data"
    scheme: "exact"
    network: "base-sepolia"
    maxAmountRequired: "10000"
    asset: "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
    payTo: "0x209693Bc6afc0C5328bA36FaF03C514EF312287C"
    maxTimeoutSeconds: 60
    patterns:
      - handle: "RefundWindow"
        definition:
          gloss: "Period during which the payer may request a refund."
          durationDays: 7
          anchor: "delivery"
      - handle: "SettlementFinality"
        definition:
          gloss: "When a settlement is considered final."
          requiresConfirmations: 12
          status: "irreversible"
      - handle: "DisputeWindow"
        definition:
          gloss: "Time a counterparty may open a dispute."
          comparator: ">="
          threshold: 72
          unit: "hours"
    acceptanceHandles: ["RefundWindow", "SettlementFinality", "DisputeWindow"]
    drift: null
  - id: "amount-basis-drift"
    title: "Checkout with drifted amount basis"
    description: >-
      The payer's registry has drifted AmountBasis from gross to net, so the
      authorized value would exclude fees the seller expects included.
    resourceDescription: "Checkout for metered compute credits."
    resource: "https://api.example.com/compute-credits"
    scheme: "exact"
    network: "base-sepolia"
    maxAmountRequired: "25000"
    asset: "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
    payTo: "0x209693Bc6afc0C5328bA36FaF03C514EF312287C"
    maxTimeoutSeconds: 60
    patterns:
      - handle: "AmountBasis"
        definition:
          gloss: "Whether the stated amount is before or after fees."
          basis: "gross"
          includesNetworkFee: true
      - handle: "FeeBearer"
        definition:
          gloss: "Which party pays protocol and network fees."
          party: "payer"
      - handle: "SettlementFinality"
        definition:
          gloss: "When a settlement is considered final."
          requiresConfirmations: 12
          status: "irreversible"
    acceptanceHandles: ["AmountBasis", "FeeBearer", "SettlementFinality"]
    drift:
      handle: "AmountBasis"
      fieldPath: "basis"
      before: "gross"
      after: "net"
      mutatedDefinition:
        gloss: "Whether the stated amount is before or after fees."
        basis: "net"
        includesNetworkFee: true
  - id: "amount-basis-clean"
    title: "Checkout with aligned amount-basis registries"
    description: "The no-drift control for the amount-basis topic."
