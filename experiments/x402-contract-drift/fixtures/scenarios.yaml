  - id: "fee-bearer-drift"
    title: "Subscription with drifted fee bearer"
    description: >-
      The payer's registry has drifted FeeBearer from payer to payee, so the
      payer would underpay relative to the seller's terms.
    resourceDescription: "Monthly subscription for inference capacity."
    resource: "https://api.example.com/subscription"
    scheme: "exact"
    network: "base-sepolia"
    maxAmountRequired: "50000"
    asset: "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
    payTo: "0x209693Bc6afc0C5328bA36FaF03C514EF312287C"
    maxTimeoutSeconds: 90
    patterns:
      - handle: "FeeBearer"
        definition:
          gloss: "Which party pays protocol and network fees."
          party: "payer"
      - handle: "DeliveryCondition"
        definition:
          gloss: "When the seller must deliver the purchased resource."
          trigger: "on_settlement"
      - handle: "AuthorizationValidity"
        definition:
          gloss: "How long a signed payment authorization remains valid."
          comparator: "<="
          threshold: 300
          unit: "seconds"
    acceptanceHandles:
      ["FeeBearer", "DeliveryCondition", "AuthorizationValidity"]
    drift:
      handle: "FeeBearer"
      fieldPath: "party"
      before: "payer"
      after: "payee"
      mutatedDefinition:
        gloss: "Which party pays protocol and network fees."
        party: "payee"
