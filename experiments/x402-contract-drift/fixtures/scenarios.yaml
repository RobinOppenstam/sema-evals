  - id: "dispute-window-drift"
    title: "Marketplace purchase with drifted dispute window"
    description: >-
      The payer's registry has drifted DisputeWindow to a shorter threshold, so
      the payer would treat disputes as closed too early.
    resourceDescription: "Marketplace purchase with dispute and refund terms."
    resource: "https://api.example.com/marketplace/order"
    scheme: "exact"
    network: "base-sepolia"
    maxAmountRequired: "42000"
    asset: "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
    payTo: "0x209693Bc6afc0C5328bA36FaF03C514EF312287C"
    maxTimeoutSeconds: 60
    patterns:
      - handle: "DisputeWindow"
        definition:
          gloss: "Time a counterparty may open a dispute."
          comparator: ">="
          threshold: 168
          unit: "hours"
      - handle: "AmountBasis"
        definition:
          gloss: "Whether the stated amount is before or after fees."
          basis: "gross"
          includesNetworkFee: false
      - handle: "PartialFillPolicy"
        definition:
          gloss: "Whether partial settlement of the required amount is allowed."
          allowPartial: false
    acceptanceHandles: ["DisputeWindow", "AmountBasis", "PartialFillPolicy"]
    drift:
      handle: "DisputeWindow"
      fieldPath: "threshold"
      before: 168
      after: 24
      mutatedDefinition:
        gloss: "Time a counterparty may open a dispute."
        comparator: ">="
        threshold: 24
