  - id: "settlement-finality-drift"
    title: "Escrow release with drifted settlement finality"
    description: >-
      The payer's registry has drifted SettlementFinality to fewer confirmations,
      so the payer would treat an unsettled transfer as final.
    resourceDescription: "Escrow release for completed delivery milestone."
    resource: "https://api.example.com/escrow/release"
    scheme: "exact"
    network: "base-sepolia"
    maxAmountRequired: "75000"
    asset: "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
    payTo: "0x209693Bc6afc0C5328bA36FaF03C514EF312287C"
    maxTimeoutSeconds: 120
    patterns:
      - handle: "SettlementFinality"
        definition:
          gloss: "When a settlement is considered final."
          requiresConfirmations: 64
          status: "irreversible"
      - handle: "DeliveryCondition"
        definition:
          gloss: "When the seller must deliver the purchased resource."
          trigger: "on_settlement"
      - handle: "DisputeWindow"
        definition:
          gloss: "Time a counterparty may open a dispute."
          comparator: ">="
          threshold: 48
          unit: "hours"
    acceptanceHandles:
      ["SettlementFinality", "DeliveryCondition", "DisputeWindow"]
    drift:
      handle: "SettlementFinality"
      fieldPath: "requiresConfirmations"
      before: 64
      after: 1
      mutatedDefinition:
        gloss: "When a settlement is considered final."
        requiresConfirmations: 1
        status: "irreversible"
  - id: "settlement-finality-clean"
    title: "Escrow release with aligned settlement-finality registries"
